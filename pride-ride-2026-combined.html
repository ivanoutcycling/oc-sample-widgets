<style>
/* Leaflet tooltip override */
.map-tip {
  background: rgba(7,7,15,0.92) !important;
  border: 1px solid rgba(255,255,255,0.15) !important;
  border-radius: 8px !important;
  color: #eeeaff !important;
  font-family: Inter, sans-serif !important;
  font-size: 11px !important;
  padding: 6px 10px !important;
  box-shadow: none !important;
}
.map-tip::before { display: none !important; }
.leaflet-control-zoom a {
  background: #1a1a2e !important;
  color: #eeeaff !important;
  border-color: rgba(255,255,255,0.15) !important;
}
.leaflet-control-zoom a:hover { background: #242440 !important; }
.leaflet-control-attribution {
  background: rgba(7,7,15,0.7) !important;
  color: rgba(238,234,255,0.35) !important;
  font-size: 9px !important;
}
.leaflet-control-attribution a { color: rgba(238,234,255,0.5) !important; }

/* ── Landmark popup ── */
.lm-popup-wrap .leaflet-popup-content-wrapper {
  background: rgba(10,10,22,0.97) !important;
  border: 1px solid rgba(255,255,255,0.13) !important;
  border-radius: 14px !important;
  box-shadow: 0 12px 40px rgba(0,0,0,0.75) !important;
  padding: 0 !important;
  overflow: hidden !important;
  backdrop-filter: blur(16px) !important;
}
.lm-popup-wrap .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
.lm-popup-wrap .leaflet-popup-tip { background: rgba(10,10,22,0.97) !important; box-shadow: none !important; }
.lm-popup-wrap .leaflet-popup-close-button {
  color: rgba(238,234,255,0.45) !important; font-size: 16px !important;
  top: 7px !important; right: 10px !important; z-index: 10 !important;
}
.lm-popup-wrap .leaflet-popup-close-button:hover { color: #eeeaff !important; }
.lm-popup-img { height: 148px; overflow: hidden; }
.lm-popup-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.lm-popup-body { padding: 11px 14px 13px; }
.lm-popup-name { font-family: 'Unbounded', sans-serif; font-size: 10.5px; font-weight: 700; color: #eeeaff; margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
.lm-popup-desc { font-size: 10px; line-height: 1.65; color: rgba(238,234,255,0.68); }
.lm-popup-credit { font-size: 8px; color: rgba(238,234,255,0.28); margin-top: 9px; padding-top: 7px; border-top: 1px solid rgba(255,255,255,0.07); }

/* ── Landmark circle marker ── */
.lm-marker-ring {
  width: 46px; height: 46px; border-radius: 50%; overflow: hidden;
  border: 2.5px solid rgba(255,255,255,0.82);
  box-shadow: 0 2px 14px rgba(0,0,0,0.65), 0 0 0 1px rgba(0,0,0,0.4);
  cursor: pointer; background: #1a1a2e; position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
}
.lm-marker-ring:hover { transform: scale(1.12); box-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,0,0,0.4); }
.lm-marker-ring img { width: 100%; height: 100%; object-fit: cover; display: block; }

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07070f;
  --surface: #0f0f1c;
  --card:    #131323;
  --border:  rgba(255,255,255,0.07);
  --text:    #eeeaff;
  --muted:   rgba(238,234,255,0.38);
  --dimmer:  rgba(238,234,255,0.14);
  --r: #FF3366; --o: #FF7A00; --y: #FFD600; --g: #00C566; --b: #0090FF; --v: #A855F7;
  --rainbow: linear-gradient(90deg, var(--r) 0%, var(--o) 20%, var(--y) 40%, var(--g) 60%, var(--b) 80%, var(--v) 100%);
}

body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

/* ── Outer shell ── */
.widget { max-width: 920px; margin: 0 auto; padding-bottom: 32px; }

/* ── Top bar ── */
.topbar { padding: 32px 36px 0; }
.rainbow-stripe { height: 3px; background: var(--rainbow); border-radius: 2px; margin-bottom: 24px; box-shadow: 0 0 24px rgba(168,85,247,0.5); }
.eyebrow { font-family: 'Unbounded', sans-serif; font-size: 9px; letter-spacing: 5px; color: var(--y); text-transform: uppercase; margin-bottom: 8px; }
.title   { font-family: 'Unbounded', sans-serif; font-size: clamp(28px, 5.5vw, 52px); font-weight: 900; line-height: 0.92; letter-spacing: -1px; background: var(--rainbow); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
.subtitle { font-size: 12px; font-weight: 300; color: var(--muted); }

/* ── Route selector ── */
.route-selector { display: flex; gap: 8px; padding: 20px 36px 0; flex-wrap: wrap; }

.route-btn {
  font-family: 'Unbounded', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 10px 20px;
  border-radius: 40px;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: #1a1a2e;
  color: rgba(238,234,255,0.6);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  -webkit-appearance: none;
}
.route-btn::before { content: ''; position: absolute; inset: 0; background: var(--rainbow); opacity: 0; transition: opacity 0.2s; }
.route-btn:hover { color: #eeeaff; border-color: rgba(255,255,255,0.35); }
.route-btn.active { color: #07070f; border-color: transparent; }
.route-btn.active::before { opacity: 1; }
.route-btn span { position: relative; z-index: 1; }

/* ── View toggle ── */
.view-toggle { display: flex; gap: 4px; padding: 14px 36px 0; }
.view-btn {
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.3px;
  padding: 7px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
  background: #1a1a2e; color: rgba(238,234,255,0.5); cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
  -webkit-appearance: none;
}
.view-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.view-btn.active { background: #242440; border-color: rgba(255,255,255,0.28); color: #eeeaff; }
.view-btn:hover:not(.active) { color: #eeeaff; border-color: rgba(255,255,255,0.25); }

/* ── Stats row ── */
.stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 1px;
  background: var(--border); margin: 16px 36px 0;
  border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
}
.stat { background: var(--surface); padding: 14px 0; text-align: center; }
.stat-val { font-family: 'Unbounded', sans-serif; font-size: clamp(18px, 3vw, 28px); font-weight: 700; line-height: 1; letter-spacing: -0.5px; }
.stat:nth-child(1) .stat-val { color: var(--y); }
.stat:nth-child(2) .stat-val { color: var(--g); }
.stat:nth-child(3) .stat-val { color: var(--b); }
.stat:nth-child(4) .stat-val { color: var(--v); }
.stat-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--dimmer); margin-top: 4px; font-weight: 500; }

/* ── Main panel ── */
.panel-wrap { padding: 20px 36px 0; position: relative; }
.panel { position: relative; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); }

/* ── Elevation canvas ── */
.elev-panel { display: block; }
canvas { display: block; width: 100%; cursor: crosshair; }
#tooltip { position: absolute; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 20; transform: translateX(-50%); }
#tooltip.show { opacity: 1; }
.tt-inner { background: rgba(7,7,15,0.95); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 14px; backdrop-filter: blur(14px); white-space: nowrap; }
.tt-dist { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
.tt-ele  { font-family: 'Unbounded', sans-serif; font-size: 19px; font-weight: 700; }
.tt-name { font-size: 10px; color: var(--muted); margin-top: 3px; font-style: italic; max-width: 180px; white-space: normal; line-height: 1.3; }
#hairline { position: absolute; width: 1px; background: rgba(255,255,255,0.12); pointer-events: none; opacity: 0; transition: opacity 0.1s; }
#hairline.show { opacity: 1; }

/* ── Map panel ── */
.map-panel { display: none; }
.map-panel.active { display: block; }
.elev-panel.active { display: block; }
.elev-panel { display: none; }

#mapsvg { width: 100%; display: block; }

/* ── Stop cards ── */
.stops-section { padding: 16px 36px 0; }
.stops-title { font-family: 'Unbounded', sans-serif; font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: var(--dimmer); margin-bottom: 10px; }
.stops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 7px; }
.stop-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; display: flex; align-items: flex-start; gap: 9px; transition: border-color 0.2s, background 0.2s; cursor: default; }
.stop-card:hover { border-color: rgba(255,255,255,0.14); }
.stop-badge { width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.stop-info { flex: 1; min-width: 0; }
.stop-name { font-size: 10.5px; font-weight: 500; line-height: 1.35; color: var(--text); margin-bottom: 2px; }
.stop-badge-pill { display: inline-block; font-size: 8px; font-family: 'DM Mono', monospace; letter-spacing: 0.5px; padding: 1px 5px; border-radius: 3px; margin-bottom: 3px; font-weight: 500; }
.stop-meta { display: flex; gap: 7px; font-size: 9.5px; color: var(--muted); align-items: center; }
.stop-mi { font-family: 'Unbounded', sans-serif; font-size: 9.5px; font-weight: 700; }

/* double-duty badge */
.dual-badge { font-size: 7.5px; font-family: 'DM Mono', monospace; padding: 2px 6px; border-radius: 3px; background: rgba(255,214,0,0.15); border: 1px solid rgba(255,214,0,0.3); color: var(--y); letter-spacing: 0.3px; margin-top: 3px; display: inline-block; line-height: 1.4; }

.divider { height: 1px; background: var(--border); margin: 16px 36px 0; }
.note { padding: 9px 36px 0; font-size: 9.5px; color: var(--dimmer); font-style: italic; }

@media (max-width: 560px) {
  .topbar,.panel-wrap,.stops-section,.divider,.note,.route-selector,.view-toggle { padding-left: 16px; padding-right: 16px; }
  .stats { margin-left: 16px; margin-right: 16px; grid-template-columns: repeat(2,1fr); }
  .stops-grid { grid-template-columns: 1fr; }
}
</style>
</head>

// ─── Stop colors ────────────────────────────────────────────────────────────
const STOP_COLORS = ['#FF3366','#FF7A00','#FFD600','#00C566','#0090FF','#A855F7'];

// ─── State ────────────────────────────────────────────────────────────────────
let activeRoute = '40', activeView = 'map';
let W = 0, H = 0;
let hoveredWptIdx = null;

// ─── Route / view switching ──────────────────────────────────────────────────
function setRoute(id) {
  activeRoute = id;
  document.querySelectorAll('.route-btn').forEach(b => b.classList.toggle('active', b.dataset.route === id));
  updateStats();
  buildStops();
  if (activeView === 'elev') drawElevation(); else drawMap();
}

function setView(v) {
  activeView = v;
  document.getElementById('btn-elev').classList.toggle('active', v === 'elev');
  document.getElementById('btn-map').classList.toggle('active', v === 'map');
  document.getElementById('elev-panel').classList.toggle('active', v === 'elev');
  document.getElementById('map-panel').classList.toggle('active', v === 'map');
  if (v === 'elev') {
    drawElevation();
  } else {
    drawMap();
    // Leaflet needs a size hint after the panel becomes visible
    setTimeout(() => { if (leafletMap) leafletMap.invalidateSize(); }, 100);
  }
}

function updateStats() {
  const s = ROUTES[activeRoute].stats;
  document.getElementById('stat-dist').textContent  = s.dist;
  document.getElementById('stat-gain').textContent  = s.gain;
  document.getElementById('stat-peak').textContent  = s.peak;
  document.getElementById('stat-stops').textContent = s.stops;
}

// ─── Stop / waypoint hover sync ──────────────────────────────────────────────
function highlightWpt(idx, redrawCanvas) {
  hoveredWptIdx = idx;
  document.querySelectorAll('.stop-card').forEach(el => {
    const elIdx = parseInt(el.dataset.stopIdx);
    if (idx !== null && elIdx === idx) {
      el.style.borderColor = el.dataset.stopColor + '99';
      el.style.background  = el.dataset.stopColor + '18';
    } else {
      el.style.borderColor = '';
      el.style.background  = '';
    }
  });
  wptMarkers.forEach((m, i) => {
    const el = m.getElement();
    if (!el) return;
    const inner = el.firstElementChild;
    if (inner) {
      inner.style.transition = 'transform 0.15s';
      inner.style.transform  = (idx !== null && i === idx) ? 'scale(1.5)' : '';
    }
    el.style.zIndex = (idx !== null && i === idx) ? '1000' : '';
  });
  if (redrawCanvas && activeView === 'elev') drawElevation();
}

// ─── Stop cards ──────────────────────────────────────────────────────────────
function buildStops() {
  const wpts = [...ROUTES[activeRoute].waypoints].sort((a,b) => a.d - b.d);
  const grid = document.getElementById('stops-grid');
  grid.innerHTML = '';
  wpts.forEach((w, i) => {
    const c = STOP_COLORS[i % STOP_COLORS.length];
    const isDual = false;

    const card = document.createElement('div');
    card.className = 'stop-card';
    card.dataset.stopIdx   = i;
    card.dataset.stopColor = c;
    card.addEventListener('mouseenter', () => highlightWpt(i, true));
    card.addEventListener('mouseleave', () => highlightWpt(null, true));

    let badgePill = '';
    if (w.t === 'gear')   badgePill = `<div class="stop-badge-pill" style="background:rgba(255,51,102,0.12);color:#FF3366;border:1px solid rgba(255,51,102,0.25)">Bike Shop</div>`;
    else if (w.t === 'toilet') badgePill = `<div class="stop-badge-pill" style="background:rgba(0,144,255,0.12);color:#0090FF;border:1px solid rgba(0,144,255,0.25)">Restroom</div>`;
    else                  badgePill = `<div class="stop-badge-pill" style="background:rgba(0,197,102,0.12);color:#00C566;border:1px solid rgba(0,197,102,0.25)">Rest Stop</div>`;

    const dualBadge = isDual
      ? `<div class="dual-badge">⟳ Also final rest stop for 40 &amp; 65 mi riders</div>` : '';

    card.innerHTML = `
      <div class="stop-badge" style="background:${c}22;color:${c};border:1px solid ${c}33">${w.icon}</div>
      <div class="stop-info">
        ${badgePill}
        <div class="stop-name">${w.n}</div>
        ${dualBadge}
        <div class="stop-meta">
          <span class="stop-mi" style="color:${c}">${w.d.toFixed(1)} mi</span>
          <span>${Math.round(w.e)} ft elev.</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ─── ELEVATION CHART ─────────────────────────────────────────────────────────
const canvas   = document.getElementById('chart');
const ctx      = canvas.getContext('2d');
const tooltip  = document.getElementById('tooltip');
const hairline = document.getElementById('hairline');
const ttDist   = document.getElementById('tt-dist');
const ttEle    = document.getElementById('tt-ele');
const ttName   = document.getElementById('tt-name');
const PAD = {top:22, right:16, bottom:42, left:54};

function dpr() { return window.devicePixelRatio || 1; }

function resizeCanvas() {
  W = canvas.parentElement.clientWidth;
  H = Math.round(W * 0.40);
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  canvas.width = W*dpr(); canvas.height = H*dpr();
  ctx.scale(dpr(), dpr());
}

function drawElevation() {
  resizeCanvas();
  const route = ROUTES[activeRoute];
  const pts = route.elevation;
  const wpts = [...route.waypoints].sort((a,b) => a.d - b.d);
  const TOTAL = pts[pts.length-1].d;
  const EMAX  = activeRoute === '100' ? 700 : 450;

  ctx.clearRect(0,0,W,H);

  function toX(d) { return PAD.left + (d/TOTAL)*(W-PAD.left-PAD.right); }
  function toY(e) { return PAD.top  + (1-e/EMAX)*(H-PAD.top-PAD.bottom); }

  // Grid
  const yTicks = activeRoute==='100' ? [0,200,400,600] : [0,100,200,300,400];
  yTicks.forEach(e => {
    const y=toY(e);
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(W-PAD.right,y); ctx.stroke();
    ctx.fillStyle='rgba(238,234,255,0.3)'; ctx.font='9.5px Inter,sans-serif'; ctx.textAlign='right';
    ctx.fillText(e+"'", PAD.left-6, y+3.5);
  });

  const step = activeRoute==='40' ? 10 : activeRoute==='65' ? 10 : 20;
  const maxMi = Math.ceil(TOTAL/step)*step;
  for (let mi=0; mi<=maxMi; mi+=step) {
    const x=toX(mi);
    if (x > W-PAD.right+2) continue;
    ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,PAD.top); ctx.lineTo(x,H-PAD.bottom); ctx.stroke();
    ctx.fillStyle='rgba(238,234,255,0.3)'; ctx.font='9.5px Inter,sans-serif'; ctx.textAlign='center';
    ctx.fillText(mi+' mi', x, H-PAD.bottom+14);
  }

  function buildPath() {
    ctx.beginPath();
    ctx.moveTo(toX(pts[0].d), toY(pts[0].e));
    for (let i=1; i<pts.length; i++) {
      const xp=toX(pts[i-1].d),yp=toY(pts[i-1].e),xc=toX(pts[i].d),yc=toY(pts[i].e);
      ctx.bezierCurveTo((xp+xc)/2,yp,(xp+xc)/2,yc,xc,yc);
    }
  }

  const lastX=toX(pts[pts.length-1].d);

  const gFill=ctx.createLinearGradient(PAD.left,0,W-PAD.right,0);
  gFill.addColorStop(0,'rgba(255,51,102,0.28)'); gFill.addColorStop(0.2,'rgba(255,122,0,0.28)');
  gFill.addColorStop(0.4,'rgba(255,214,0,0.28)'); gFill.addColorStop(0.6,'rgba(0,197,102,0.28)');
  gFill.addColorStop(0.8,'rgba(0,144,255,0.28)'); gFill.addColorStop(1,'rgba(168,85,247,0.28)');
  buildPath(); ctx.lineTo(lastX,H-PAD.bottom); ctx.lineTo(toX(0),H-PAD.bottom); ctx.closePath();
  ctx.fillStyle=gFill; ctx.fill();

  const gFade=ctx.createLinearGradient(0,PAD.top,0,H-PAD.bottom);
  gFade.addColorStop(0,'rgba(7,7,15,0)'); gFade.addColorStop(1,'rgba(7,7,15,0.5)');
  buildPath(); ctx.lineTo(lastX,H-PAD.bottom); ctx.lineTo(toX(0),H-PAD.bottom); ctx.closePath();
  ctx.fillStyle=gFade; ctx.fill();

  const gLine=ctx.createLinearGradient(PAD.left,0,W-PAD.right,0);
  gLine.addColorStop(0,'#FF3366'); gLine.addColorStop(0.2,'#FF7A00'); gLine.addColorStop(0.4,'#FFD600');
  gLine.addColorStop(0.6,'#00C566'); gLine.addColorStop(0.8,'#0090FF'); gLine.addColorStop(1,'#A855F7');
  buildPath(); ctx.strokeStyle=gLine; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.setLineDash([]); ctx.stroke();

  // Waypoints
  wpts.forEach((w, i) => {
    const x=toX(w.d), y=toY(w.e), c=STOP_COLORS[i%STOP_COLORS.length];
    const hot = i === hoveredWptIdx;
    const r0=hot?15:10, r1=hot?9:6, r2=hot?5:4;
    ctx.setLineDash([3,5]); ctx.strokeStyle=c+(hot?'88':'55'); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,y+r2+2); ctx.lineTo(x,H-PAD.bottom); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(x,y,r0,0,Math.PI*2); ctx.fillStyle=c+(hot?'33':'1a'); ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r1,0,Math.PI*2); ctx.fillStyle=c+(hot?'77':'44'); ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r2,0,Math.PI*2); ctx.fillStyle=c; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r2,0,Math.PI*2); ctx.strokeStyle='rgba(7,7,15,0.85)'; ctx.lineWidth=1.5; ctx.stroke();
    if(W>480) { ctx.fillStyle=c; ctx.font=(hot?'bold 9px':'bold 8px')+' Inter,sans-serif'; ctx.textAlign='center'; ctx.fillText(i+1,x,y-(r0+3)); }
  });

  // Hover
  canvas._toX = toX; canvas._toY = toY; canvas._pts = pts; canvas._wpts = wpts; canvas._TOTAL = TOTAL;
}

function getNearestPt(mx) {
  const pts=canvas._pts; if(!pts) return null;
  let best=null,bestD=Infinity;
  pts.forEach(p=>{ const dx=Math.abs(canvas._toX(p.d)-mx); if(dx<bestD){bestD=dx;best=p;} });
  return best;
}
function getNearbyWpt(d) {
  const wpts=canvas._wpts,TOTAL=canvas._TOTAL; if(!wpts) return null;
  const thr=TOTAL*0.02;
  for(const w of wpts) if(Math.abs(w.d-d)<thr) return w;
  return null;
}

function onMove(e) {
  if(activeView!=='elev') return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const pt=getNearestPt(mx); if(!pt) return;
  const x=canvas._toX(pt.d), y=canvas._toY(pt.e), nearby=getNearbyWpt(pt.d);
  ttDist.textContent=pt.d.toFixed(1)+' miles';
  ttEle.textContent=Math.round(pt.e)+' ft';
  ttName.textContent=nearby?nearby.n:'';
  const hue=Math.round((pt.d/canvas._TOTAL)*280);
  ttEle.style.background=`linear-gradient(90deg,hsl(${hue},90%,65%),hsl(${hue+40},90%,65%))`;
  ttEle.style.webkitBackgroundClip='text'; ttEle.style.webkitTextFillColor='transparent'; ttEle.style.backgroundClip='text';
  let left=x; if(left-90<PAD.left)left=PAD.left+90; if(left+90>W-PAD.right)left=W-PAD.right-90;
  tooltip.style.left=left+'px'; tooltip.style.top=Math.max(PAD.top,y-80)+'px'; tooltip.classList.add('show');
  hairline.style.left=x+'px'; hairline.style.top=PAD.top+'px'; hairline.style.height=(H-PAD.top-PAD.bottom)+'px'; hairline.classList.add('show');
  const nearbyIdx = nearby ? canvas._wpts.indexOf(nearby) : -1;
  const newIdx = nearbyIdx === -1 ? null : nearbyIdx;
  if (newIdx !== hoveredWptIdx) highlightWpt(newIdx, false);
}
function onLeave() {
  tooltip.classList.remove('show');
  hairline.classList.remove('show');
  highlightWpt(null, false);
}
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
canvas.addEventListener('mouseleave',onLeave);
canvas.addEventListener('touchend',onLeave);

// ─── MAP (Leaflet) ────────────────────────────────────────────────────────────
// Per-route center + zoom for Leaflet
const ROUTE_VIEW = {
  '40':  { center: [40.935, -73.940], zoom: 11 },
  '65':  { center: [40.990, -73.940], zoom: 10 },
  '100': { center: [41.017, -74.015], zoom: 10 },
};

let leafletMap = null;
let routeLayer = null;
let markerLayers = [];
let wptMarkers = [];
let landmarkMarkers = [];

function initLeaflet() {
  leafletMap = L.map('leaflet-map', { zoomControl: true, attributionControl: true });

  function hideLoader() {
    const el = document.getElementById('map-loading');
    if (el) el.style.display = 'none';
  }

  // Provider list — tried in order, first to fire tileload wins
  const providers = [
    {
      url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      opts: { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>', subdomains: 'abcd', maxZoom: 20 }
    },
    {
      url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      opts: { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', subdomains: 'abc', maxZoom: 19 }
    },
    {
      url: 'https://tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
      opts: { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19 }
    }
  ];

  let providerIdx = 0;
  let currentLayer = null;
  let loaded = false;

  function tryProvider(idx) {
    if (idx >= providers.length) return;
    if (currentLayer) leafletMap.removeLayer(currentLayer);
    const p = providers[idx];
    currentLayer = L.tileLayer(p.url, p.opts);
    currentLayer.on('tileload', () => {
      if (!loaded) { loaded = true; hideLoader(); }
    });
    currentLayer.on('tileerror', () => {
      if (!loaded) tryProvider(idx + 1);
    });
    currentLayer.addTo(leafletMap);
  }

  tryProvider(0);

  // Safety: hide loader after 4s regardless
  setTimeout(hideLoader, 4000);
}

function drawMap() {
  if (!leafletMap) initLeaflet();

  const route = ROUTES[activeRoute];
  const view  = ROUTE_VIEW[activeRoute];
  const wpts  = [...route.waypoints].sort((a,b) => a.d - b.d);

  // ── Remove ALL previously drawn route/marker layers ──────────────────────
  markerLayers.forEach(layer => leafletMap.removeLayer(layer));
  markerLayers = [];
  wptMarkers = [];
  landmarkMarkers.forEach(layer => leafletMap.removeLayer(layer));
  landmarkMarkers = [];
  if (routeLayer) { leafletMap.removeLayer(routeLayer); routeLayer = null; }

  leafletMap.setView(view.center, view.zoom);

  // ── Rainbow route (6 colour segments) ────────────────────────────────────
  const latLons  = route.map.map(p => [p.lat, p.lon]);
  const PRIDE    = ['#FF3366','#FF7A00','#FFD600','#00C566','#0090FF','#A855F7'];
  const segCount = 6;
  const segSize  = Math.floor(latLons.length / segCount);

  for (let s = 0; s < segCount; s++) {
    const from = s * segSize;
    const to   = s === segCount - 1 ? latLons.length : (s + 1) * segSize + 1;
    const seg  = latLons.slice(from, to);
    const glow = L.polyline(seg, { color: PRIDE[s], weight: 10, opacity: 0.18 }).addTo(leafletMap);
    const line = L.polyline(seg, { color: PRIDE[s], weight: 3.5, opacity: 1.0  }).addTo(leafletMap);
    markerLayers.push(glow, line);
  }

  // ── Start / finish marker ─────────────────────────────────────────────────
  const startIcon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:#FFD600;border:2px solid #07070f;box-shadow:0 0 8px rgba(255,214,0,0.6)"></div>`,
    iconSize: [14,14], iconAnchor: [7,7]
  });
  const startM = L.marker([route.map[0].lat, route.map[0].lon], { icon: startIcon })
    .bindTooltip('START / FINISH', { permanent: false, direction: 'right', className: 'map-tip' })
    .addTo(leafletMap);
  markerLayers.push(startM);

  // ── Waypoint markers ──────────────────────────────────────────────────────
  wpts.forEach((w, i) => {
    const c = STOP_COLORS[i % STOP_COLORS.length];
    const shortName = w.n.replace('Rest Stop — ','').replace('Rest Stop - ','').split(',')[0];
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:22px;height:22px;border-radius:50%;background:${c};border:2px solid #07070f;display:flex;align-items:center;justify-content:center;font-family:Unbounded,sans-serif;font-size:9px;font-weight:700;color:#07070f;box-shadow:0 0 10px ${c}88">${i+1}</div>`,
      iconSize: [22,22], iconAnchor: [11,11]
    });
    const m = L.marker([w.lat, w.lon], { icon })
      .bindTooltip(`<strong>${shortName}</strong><br>${w.d.toFixed(1)} mi · ${Math.round(w.e)} ft`, {
        direction: 'right', className: 'map-tip'
      })
      .addTo(leafletMap);
    m.on('mouseover', () => highlightWpt(i, false));
    m.on('mouseout',  () => highlightWpt(null, false));
    markerLayers.push(m);
    wptMarkers.push(m);
  });

  // ── Landmark highlight markers ────────────────────────────────────────────
  (route.landmarks || []).forEach(lm => {
    const lmIcon = L.divIcon({
      className: '',
      html: `<div class="lm-marker-ring"><img src="${lm.img}" alt="${lm.name}"></div>`,
      iconSize: [46, 46], iconAnchor: [23, 23]
    });

    const popupContent = `
      <div>
        <div class="lm-popup-img"><img src="${lm.fullImg}" alt="${lm.name}" loading="lazy"></div>
        <div class="lm-popup-body">
          <div class="lm-popup-name"><span>${lm.icon}</span>${lm.name}</div>
          <div class="lm-popup-desc">${lm.desc}</div>
          <div class="lm-popup-credit">${lm.credit}</div>
        </div>
      </div>`;

    const m = L.marker([lm.lat, lm.lon], { icon: lmIcon, zIndexOffset: -100 })
      .bindPopup(popupContent, { className: 'lm-popup-wrap', maxWidth: 260, minWidth: 260 })
      .addTo(leafletMap);
    landmarkMarkers.push(m);
  });

  setTimeout(() => leafletMap.invalidateSize(), 50);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
updateStats();
buildStops();
drawMap();
window.addEventListener('resize', () => {
  if (activeView === 'elev') drawElevation();
});
</script>
</body>
</html>
